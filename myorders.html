{% extends "base.html" %}

{% block content %}

<div class="container mt-5">
    <h2>My Orders</h2>

    {% if orders %}
        <table class="table">
            <tr>
                <th>Food</th>
                <th>Quantity</th>
                <th>Total</th>
                <th>Status</th>
            </tr>

            {% for order in orders %}
            <tr>
                <td>{{ order.food_name }}</td>
                <td>{{ order.quantity }}</td>
                <td>{{ order.total }}</td>
                <td>{{ order.status }}</td>
            </tr>
            {% endfor %}
        </table>
    {% else %}
        <p>No orders found.</p>
    {% endif %}
</div>

{% endblock %}
